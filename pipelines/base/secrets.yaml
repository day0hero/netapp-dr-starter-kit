---
# =============================================================================
# Secret Templates for DR Pipeline
# =============================================================================
#
# Create these secrets before running the pipeline.
# Replace placeholder values with actual credentials.
#
# Option A: Create secrets manually using 'oc create secret' commands below.
# Option B: Use ExternalSecrets (see external-secrets.yaml) if Vault is configured.
#
# Required secrets:
#   1. aws-credentials       - AWS access key and secret key
#   2. fsx-admin-password    - FSx/SVM admin password
#   3. git-credentials       - Git SSH key or token for push access
#   4. prod-kubeconfig       - Kubeconfig for the production cluster
#   5. dr-kubeconfig         - Kubeconfig for the DR cluster
# =============================================================================

# --- 1. AWS Credentials ---
# oc create secret generic aws-credentials -n dr-pipelines \
#   --from-literal=AWS_ACCESS_KEY_ID=<your-access-key> \
#   --from-literal=AWS_SECRET_ACCESS_KEY=<your-secret-key>
apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: dr-pipelines
  labels:
    app.kubernetes.io/part-of: netapp-dr-starter-kit
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"

---
# --- 2. FSx Admin Password ---
# oc create secret generic fsx-admin-password -n dr-pipelines \
#   --from-literal=password=<your-fsx-password>
apiVersion: v1
kind: Secret
metadata:
  name: fsx-admin-password
  namespace: dr-pipelines
  labels:
    app.kubernetes.io/part-of: netapp-dr-starter-kit
type: Opaque
stringData:
  password: "REPLACE_ME"

---
# --- 3. Git Credentials ---
# For SSH key auth:
#   oc create secret generic git-credentials -n dr-pipelines \
#     --from-file=ssh-privatekey=$HOME/.ssh/id_rsa \
#     --from-literal=known_hosts="$(ssh-keyscan github.com 2>/dev/null)"
#     --type=kubernetes.io/ssh-auth
#
# For token auth:
#   oc create secret generic git-credentials -n dr-pipelines \
#     --from-literal=token=<github-pat> \
#     --from-literal=username=<github-username>
apiVersion: v1
kind: Secret
metadata:
  name: git-credentials
  namespace: dr-pipelines
  labels:
    app.kubernetes.io/part-of: netapp-dr-starter-kit
  annotations:
    tekton.dev/git-0: https://github.com
type: kubernetes.io/basic-auth
stringData:
  username: "REPLACE_ME"
  password: "REPLACE_WITH_GITHUB_PAT"

---
# --- 4. Production Kubeconfig ---
# oc create secret generic prod-kubeconfig -n dr-pipelines \
#   --from-file=kubeconfig=/path/to/prod/auth/kubeconfig
apiVersion: v1
kind: Secret
metadata:
  name: prod-kubeconfig
  namespace: dr-pipelines
  labels:
    app.kubernetes.io/part-of: netapp-dr-starter-kit
type: Opaque
data: {}

---
# --- 5. DR Kubeconfig ---
# oc create secret generic dr-kubeconfig -n dr-pipelines \
#   --from-file=kubeconfig=/path/to/dr/auth/kubeconfig
apiVersion: v1
kind: Secret
metadata:
  name: dr-kubeconfig
  namespace: dr-pipelines
  labels:
    app.kubernetes.io/part-of: netapp-dr-starter-kit
type: Opaque
data: {}
