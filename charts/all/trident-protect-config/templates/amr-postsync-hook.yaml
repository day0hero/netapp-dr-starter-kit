{{- if .Values.tridentProtect.appMirrorRelationships }}
{{- if gt (len .Values.tridentProtect.appMirrorRelationships) 0 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: amr-uid-patch-script
  namespace: trident-protect
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
data:
  patch-uids.py: |
    #!/usr/bin/env python3
    """Discover source Application UIDs from the AppVault S3 bucket and patch AMRs."""
    import json, os, sys, datetime, hashlib, hmac, ssl, urllib.parse
    import urllib.request, urllib.error
    import xml.etree.ElementTree as ET

    TOKEN_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/token"
    API = "https://kubernetes.default.svc"
    BUCKET = os.environ["S3_BUCKET"]
    REGION = os.environ["S3_REGION"]
    ACCESS_KEY = os.environ["AWS_ACCESS_KEY_ID"]
    SECRET_KEY = os.environ["AWS_SECRET_ACCESS_KEY"]
    AMR_DEFINITIONS = json.loads(os.environ.get("AMR_DEFINITIONS", "[]"))

    CTX = ssl.create_default_context()
    CTX.check_hostname = False
    CTX.verify_mode = ssl.CERT_NONE

    def sign(key, msg):
        return hmac.new(key, msg.encode("utf-8"), hashlib.sha256).digest()

    def s3_request(method, path, query_params=None):
        host = f"{BUCKET}.s3.{REGION}.amazonaws.com"
        now = datetime.datetime.now(datetime.timezone.utc)
        datestamp = now.strftime("%Y%m%d")
        amzdate = now.strftime("%Y%m%dT%H%M%SZ")
        payload_hash = hashlib.sha256(b"").hexdigest()

        qs = urllib.parse.urlencode(sorted((query_params or {}).items()))
        canonical = "\n".join([
            method, f"/{path}", qs,
            f"host:{host}", f"x-amz-content-sha256:{payload_hash}",
            f"x-amz-date:{amzdate}", "",
            "host;x-amz-content-sha256;x-amz-date", payload_hash,
        ])
        scope = f"{datestamp}/{REGION}/s3/aws4_request"
        string_to_sign = "\n".join([
            "AWS4-HMAC-SHA256", amzdate, scope,
            hashlib.sha256(canonical.encode("utf-8")).hexdigest(),
        ])
        k = sign(sign(sign(sign(
            f"AWS4{SECRET_KEY}".encode("utf-8"), datestamp),
            REGION), "s3"), "aws4_request")
        sig = hmac.new(k, string_to_sign.encode("utf-8"), hashlib.sha256).hexdigest()
        auth = (f"AWS4-HMAC-SHA256 Credential={ACCESS_KEY}/{scope},"
                f"SignedHeaders=host;x-amz-content-sha256;x-amz-date,"
                f"Signature={sig}")

        url = f"https://{host}/{path}"
        if qs:
            url += f"?{qs}"
        req = urllib.request.Request(url, headers={
            "Host": host, "x-amz-date": amzdate,
            "x-amz-content-sha256": payload_hash,
            "Authorization": auth,
        })
        return urllib.request.urlopen(req).read()

    def discover_app_uid(app_name):
        """Scan AppVault S3 for snapshot directories matching this app and return the UID."""
        params = {
            "list-type": "2",
            "prefix": f"{app_name}_",
            "delimiter": "/",
            "max-keys": "50",
        }
        raw = s3_request("GET", "", params)
        root = ET.fromstring(raw)
        ns = root.tag.rsplit("}", 1)[0] + "}" if "}" in root.tag else ""

        prefixes = []
        for cp in root.findall(f"{ns}CommonPrefixes"):
            p = cp.findtext(f"{ns}Prefix", "")
            if p:
                prefixes.append(p.rstrip("/"))

        if not prefixes:
            return None

        best_uid = None
        best_ts = ""
        for prefix in prefixes:
            uid = prefix.split("_", 1)[1] if "_" in prefix else None
            if not uid:
                continue
            snap_params = {
                "list-type": "2",
                "prefix": f"{prefix}/snapshots/",
                "max-keys": "5",
            }
            try:
                snap_raw = s3_request("GET", "", snap_params)
                snap_root = ET.fromstring(snap_raw)
                count = int(snap_root.findtext(f"{ns}KeyCount", "0"))
                if count > 0:
                    keys = [c.findtext(f"{ns}Key", "") for c in snap_root.findall(f"{ns}Contents")]
                    latest_key = sorted(keys, reverse=True)[0] if keys else ""
                    ts = latest_key.split("/snapshots/", 1)[-1][:14] if "/snapshots/" in latest_key else ""
                    if ts > best_ts:
                        best_ts = ts
                        best_uid = uid
            except Exception as e:
                print(f"    Warning: could not list snapshots for {prefix}: {e}")
                continue

        return best_uid

    def kube_api(method, path, data=None):
        token = open(TOKEN_PATH).read().strip()
        headers = {"Authorization": f"Bearer {token}"}
        body = None
        if data is not None:
            body = json.dumps(data).encode("utf-8")
            headers["Content-Type"] = "application/merge-patch+json"
        req = urllib.request.Request(
            f"{API}{path}", data=body, method=method, headers=headers,
        )
        try:
            return json.loads(urllib.request.urlopen(req, context=CTX).read())
        except urllib.error.HTTPError as e:
            err = e.read().decode()
            print(f"  API error {e.code}: {err}", file=sys.stderr)
            return {"error": err, "code": e.code}

    print("=== AMR UID Patch — discovering UIDs from AppVault snapshots ===")
    errors = 0
    for amr in AMR_DEFINITIONS:
        amr_name = amr["name"]
        app_name = amr["sourceApplicationName"]
        app_ns = amr.get("sourceApplicationNamespace", app_name)
        base = f"/apis/protect.trident.netapp.io/v1/namespaces/{app_ns}"

        print(f"\n--- {amr_name} (app={app_name}) ---")

        discovered_uid = discover_app_uid(app_name)
        if not discovered_uid:
            print(f"  ERROR: No snapshots found in AppVault for app '{app_name}'")
            errors += 1
            continue
        print(f"  Discovered UID from AppVault: {discovered_uid}")

        amr_data = kube_api("GET", f"{base}/appmirrorrelationships/{amr_name}")
        if "error" in amr_data:
            print(f"  AMR not found yet, skipping")
            errors += 1
            continue

        current_uid = amr_data.get("spec", {}).get("sourceApplicationUID", "")
        current_nsmap = amr_data.get("spec", {}).get("namespaceMapping") or []

        patch = {}
        if current_uid != discovered_uid:
            print(f"  sourceApplicationUID: {current_uid or '<empty>'} -> {discovered_uid}")
            patch["sourceApplicationUID"] = discovered_uid

        if not current_nsmap:
            app_data = kube_api("GET", f"{base}/applications/{app_name}")
            if "error" not in app_data:
                ns_list = app_data.get("spec", {}).get("includedNamespaces", [])
                nsmap = [{"source": n["namespace"], "destination": n["namespace"]}
                         for n in ns_list if "namespace" in n]
                if nsmap:
                    print(f"  namespaceMapping: populating from Application")
                    patch["namespaceMapping"] = nsmap

        if patch:
            result = kube_api("PATCH", f"{base}/appmirrorrelationships/{amr_name}",
                              {"spec": patch})
            if "error" not in result:
                print(f"  Patched successfully")
            else:
                print(f"  Patch failed")
                errors += 1
        else:
            print(f"  No patch needed (UID already correct)")

    print(f"\n=== AMR UID patch complete (errors: {errors}) ===")
    sys.exit(1 if errors else 0)
---
apiVersion: batch/v1
kind: Job
metadata:
  name: amr-uid-patch
  namespace: trident-protect
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: trident-protect-amr-reconcile
      containers:
        - name: patch-uids
          image: {{ .Values.tridentProtect.amrPostSync.image | default "image-registry.openshift-image-registry.svc:5000/openshift/tools" }}
          command: ["python3", "/scripts/patch-uids.py"]
          env:
            - name: AMR_DEFINITIONS
              value: {{ .Values.tridentProtect.appMirrorRelationships | toJson | quote }}
            - name: S3_BUCKET
              value: {{ .Values.tridentProtect.appVault.s3.bucketName | quote }}
            - name: S3_REGION
              value: {{ .Values.tridentProtect.appVault.s3.region | quote }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tridentProtect.appVault.credentials.secretName }}
                  key: accessKeyID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tridentProtect.appVault.credentials.secretName }}
                  key: secretAccessKey
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: amr-uid-patch-script
            items:
              - key: patch-uids.py
                path: patch-uids.py
{{- end }}
{{- end }}
