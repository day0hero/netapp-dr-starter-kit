{{- if .Values.tridentProtect.appMirrorRelationships }}
{{- if gt (len .Values.tridentProtect.appMirrorRelationships) 0 }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: amr-reconcile-config
  namespace: trident-protect
  annotations:
    argocd.argoproj.io/sync-wave: "5"
data:
  amr-definitions.json: |
    {{- range .Values.tridentProtect.appMirrorRelationships }}
    {
      "name": {{ .name | quote }},
      "desiredState": {{ .desiredState | default "Established" | quote }},
      "sourceAppVaultRef": {{ .sourceAppVaultRef | quote }},
      "destinationAppVaultRef": {{ .destinationAppVaultRef | quote }},
      "sourceApplicationName": {{ .sourceApplicationName | quote }},
      "recurrenceRule": {{ .recurrenceRule | default "DTSTART:20240101T000000Z\\nRRULE:FREQ=HOURLY;INTERVAL=1" | quote }},
      "storageClassName": {{ .storageClassName | default "" | quote }},
      "namespaceMapping": {{ .namespaceMapping | default list | toJson }}
    }
    {{- end }}
  reconcile.sh: |
    #!/bin/bash
    set -uo pipefail
    TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
    API_URL="https://kubernetes.default.svc"
    NS="trident-protect"
    BASE="${API_URL}/apis/protect.trident.netapp.io/v1/namespaces/${NS}"

    api() {
      curl -sk -H "Authorization: Bearer ${TOKEN}" -H "Content-Type: application/json" "$@"
    }

    echo "=== AMR Reconcile ($(date -u +%H:%M:%S)) ==="

    for DEF_FILE in /config/amr-definitions.json; do
      while IFS= read -r LINE; do
        [ -z "${LINE}" ] && continue

        AMR_NAME=$(echo "${LINE}" | jq -r '.name')
        APP_NAME=$(echo "${LINE}" | jq -r '.sourceApplicationName')
        echo "Processing AMR: ${AMR_NAME} (app: ${APP_NAME})"

        APP_JSON=$(api "${BASE}/applications/${APP_NAME}")
        APP_UID=$(echo "${APP_JSON}" | jq -r '.metadata.uid // empty')

        if [ -z "${APP_UID}" ]; then
          echo "  Application '${APP_NAME}' not found or not ready — skipping"
          continue
        fi

        echo "  Application UID: ${APP_UID}"

        EXISTING_CODE=$(api -o /dev/null -w '%{http_code}' "${BASE}/appmirrorrelationships/${AMR_NAME}")

        if [ "${EXISTING_CODE}" = "200" ]; then
          CURRENT_UID=$(api "${BASE}/appmirrorrelationships/${AMR_NAME}" | jq -r '.spec.sourceApplicationUID // empty')
          if [ "${CURRENT_UID}" = "${APP_UID}" ]; then
            echo "  AMR exists with correct UID — no update needed"
          else
            echo "  UID mismatch (current: ${CURRENT_UID}, expected: ${APP_UID}) — patching"
            api -X PATCH "${BASE}/appmirrorrelationships/${AMR_NAME}" \
              -H "Content-Type: application/merge-patch+json" \
              -d "{\"spec\":{\"sourceApplicationUID\":\"${APP_UID}\"}}" | jq -r '.metadata.name // "patch failed"'
          fi
        else
          echo "  Creating AMR '${AMR_NAME}'..."
          DESIRED_STATE=$(echo "${LINE}" | jq -r '.desiredState')
          SRC_VAULT=$(echo "${LINE}" | jq -r '.sourceAppVaultRef')
          DST_VAULT=$(echo "${LINE}" | jq -r '.destinationAppVaultRef')
          RECURRENCE=$(echo "${LINE}" | jq -r '.recurrenceRule')
          STORAGE_CLASS=$(echo "${LINE}" | jq -r '.storageClassName // empty')
          NS_MAPPING=$(echo "${LINE}" | jq -c '.namespaceMapping')

          BODY=$(jq -n \
            --arg name "${AMR_NAME}" \
            --arg state "${DESIRED_STATE}" \
            --arg srcVault "${SRC_VAULT}" \
            --arg dstVault "${DST_VAULT}" \
            --arg srcApp "${APP_NAME}" \
            --arg uid "${APP_UID}" \
            --arg recurrence "${RECURRENCE}" \
            --arg sc "${STORAGE_CLASS}" \
            --argjson nsmap "${NS_MAPPING}" \
            '{
              apiVersion: "protect.trident.netapp.io/v1",
              kind: "AppMirrorRelationship",
              metadata: { name: $name, namespace: "trident-protect" },
              spec: {
                desiredState: $state,
                sourceAppVaultRef: $srcVault,
                destinationAppVaultRef: $dstVault,
                sourceApplicationName: $srcApp,
                sourceApplicationUID: $uid,
                namespaceMapping: $nsmap,
                recurrenceRule: $recurrence
              }
            }
            | if $sc != "" then .spec.storageClassName = $sc else . end')

          api -X POST "${BASE}/appmirrorrelationships" -d "${BODY}" | jq -r '.metadata.name // "create failed"'
        fi
      done < <(grep -v '^\s*$' "${DEF_FILE}" | jq -c '.')
    done

    echo "=== AMR Reconcile complete ==="
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: trident-protect-amr-reconcile
  namespace: trident-protect
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  schedule: {{ .Values.tridentProtect.amrReconcile.schedule | default "*/3 * * * *" | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 120
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: trident-protect-amr-reconcile
          containers:
            - name: amr-reconcile
              image: {{ .Values.tridentProtect.amrReconcile.image | default "image-registry.openshift-image-registry.svc:5000/openshift/tools" }}
              command: ["/bin/bash", "/scripts/reconcile.sh"]
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: config
                  mountPath: /config
                  readOnly: true
          volumes:
            - name: scripts
              configMap:
                name: amr-reconcile-config
                items:
                  - key: reconcile.sh
                    path: reconcile.sh
            - name: config
              configMap:
                name: amr-reconcile-config
                items:
                  - key: amr-definitions.json
                    path: amr-definitions.json
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trident-protect-amr-reconcile
  namespace: trident-protect
  annotations:
    argocd.argoproj.io/sync-wave: "5"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: trident-protect-amr-reconcile
  namespace: trident-protect
  annotations:
    argocd.argoproj.io/sync-wave: "5"
rules:
  - apiGroups: ["protect.trident.netapp.io"]
    resources: ["applications"]
    verbs: ["get", "list"]
  - apiGroups: ["protect.trident.netapp.io"]
    resources: ["appmirrorrelationships"]
    verbs: ["get", "list", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trident-protect-amr-reconcile
  namespace: trident-protect
  annotations:
    argocd.argoproj.io/sync-wave: "5"
subjects:
  - kind: ServiceAccount
    name: trident-protect-amr-reconcile
    namespace: trident-protect
roleRef:
  kind: Role
  name: trident-protect-amr-reconcile
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
