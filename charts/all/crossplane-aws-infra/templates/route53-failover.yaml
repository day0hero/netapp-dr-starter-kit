{{- if .Values.route53Failover.enabled }}
{{- $providerConfigRef := .Values.global.providerConfigRef }}
{{- $r53 := .Values.route53Failover }}

{{/* Hosted Zone */}}
{{- if $r53.createHostedZone }}
---
apiVersion: route53.aws.upbound.io/v1beta1
kind: Zone
metadata:
  name: dr-{{ $r53.domain | replace "." "-" }}
  labels:
    {{- include "crossplane-aws-infra.labels" . | nindent 4 }}
spec:
  forProvider:
    name: {{ $r53.domain }}
    tags:
      Name: {{ $r53.domain }}
      {{- range $k, $v := $r53.tags }}
      {{ $k }}: {{ $v | quote }}
      {{- end }}
  providerConfigRef:
    name: {{ $providerConfigRef }}
{{- end }}

{{/* Per-app health checks and failover records */}}
{{- range $app := $r53.apps }}
{{- $hcPath := $app.healthCheckPath | default $r53.healthCheckPath | default "/" }}
{{- $primaryHcFqdn := default $r53.primaryHealthCheckFqdn $app.primaryHealthCheckFqdn }}
{{- $secondaryHcFqdn := default $r53.secondaryHealthCheckFqdn $app.secondaryHealthCheckFqdn }}
---
apiVersion: route53.aws.upbound.io/v1beta1
kind: HealthCheck
metadata:
  name: {{ $app.name }}-primary-hc
  labels:
    {{- include "crossplane-aws-infra.labels" $ | nindent 4 }}
spec:
  forProvider:
    fqdn: {{ $primaryHcFqdn | quote }}
    port: 443
    type: HTTPS
    resourcePath: {{ $hcPath | quote }}
    failureThreshold: 3
    requestInterval: 30
    tags:
      Name: {{ $app.name }}-primary-hc
      {{- range $k, $v := $r53.tags }}
      {{ $k }}: {{ $v | quote }}
      {{- end }}
  providerConfigRef:
    name: {{ $providerConfigRef }}
---
apiVersion: route53.aws.upbound.io/v1beta1
kind: HealthCheck
metadata:
  name: {{ $app.name }}-secondary-hc
  labels:
    {{- include "crossplane-aws-infra.labels" $ | nindent 4 }}
spec:
  forProvider:
    fqdn: {{ $secondaryHcFqdn | quote }}
    port: 443
    type: HTTPS
    resourcePath: {{ $hcPath | quote }}
    failureThreshold: 3
    requestInterval: 30
    tags:
      Name: {{ $app.name }}-secondary-hc
      {{- range $k, $v := $r53.tags }}
      {{ $k }}: {{ $v | quote }}
      {{- end }}
  providerConfigRef:
    name: {{ $providerConfigRef }}
---
apiVersion: route53.aws.upbound.io/v1beta2
kind: Record
metadata:
  name: {{ $app.name }}-primary
  labels:
    {{- include "crossplane-aws-infra.labels" $ | nindent 4 }}
spec:
  forProvider:
    {{- if $r53.createHostedZone }}
    zoneIdRef:
      name: dr-{{ $r53.domain | replace "." "-" }}
    {{- else }}
    zoneId: {{ required "route53Failover.hostedZoneId is required when route53Failover.createHostedZone is false — set it to the Route53 hosted zone ID for route53Failover.domain (e.g. Z123... from AWS console or list-hosted-zones)" $r53.hostedZoneId | quote }}
    {{- end }}
    name: {{ $app.name }}.{{ $r53.domain }}
    type: CNAME
    ttl: {{ $r53.recordTtl }}
    setIdentifier: {{ $app.name }}-primary
    failoverRoutingPolicy:
      type: PRIMARY
    records:
      - {{ $r53.primaryIngressHostname | quote }}
    healthCheckIdRef:
      name: {{ $app.name }}-primary-hc
  providerConfigRef:
    name: {{ $providerConfigRef }}
---
apiVersion: route53.aws.upbound.io/v1beta2
kind: Record
metadata:
  name: {{ $app.name }}-secondary
  labels:
    {{- include "crossplane-aws-infra.labels" $ | nindent 4 }}
spec:
  forProvider:
    {{- if $r53.createHostedZone }}
    zoneIdRef:
      name: dr-{{ $r53.domain | replace "." "-" }}
    {{- else }}
    zoneId: {{ required "route53Failover.hostedZoneId is required when route53Failover.createHostedZone is false — set it to the Route53 hosted zone ID for route53Failover.domain (e.g. Z123... from AWS console or list-hosted-zones)" $r53.hostedZoneId | quote }}
    {{- end }}
    name: {{ $app.name }}.{{ $r53.domain }}
    type: CNAME
    ttl: {{ $r53.recordTtl }}
    setIdentifier: {{ $app.name }}-secondary
    failoverRoutingPolicy:
      type: SECONDARY
    records:
      - {{ $r53.secondaryIngressHostname | quote }}
    healthCheckIdRef:
      name: {{ $app.name }}-secondary-hc
  providerConfigRef:
    name: {{ $providerConfigRef }}
{{- end }}

{{- end }}
