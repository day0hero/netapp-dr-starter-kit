# Terraform state bucket configuration
terraform:
  state:
    bucket: patterns-terraform-state
    region: us-west-1
    dynamodb_table: terraform-state-lock

# Trident Protect configuration
tridentProtect:
  appVault:
    enabled: true
    name: aws-s3-appvault
    providerType: AWS
    credentials:
      vaultPath: secret/data/hub/aws
      secretName: trident-protect-s3-creds
    s3:
      endpoint: https://s3.us-west-1.amazonaws.com
      bucketName: trident-protect-bucket

  # Applications to protect
  applications:
    - name: boutique
      namespaces:
        - name: boutique
    - name: wordpress
      namespaces:
        - name: wordpress
    # To add VM workloads later:
    # - name: vm-workloads
    #   namespaces:
    #     - name: vm-workloads

  # AMR CronJob configuration
  amrReconcile:
    schedule: "*/3 * * * *"
    image: image-registry.openshift-image-registry.svc:5000/openshift/tools

  # AppMirrorRelationships for DR replication
  # sourceApplicationUID is resolved automatically by the amr-reconcile CronJob
  appMirrorRelationships:
    - name: boutique-mirror
      sourceAppVaultRef: s3-appvault
      destinationAppVaultRef: s3-appvault
      sourceApplicationName: boutique
      recurrenceRule: "DTSTART:20240101T000000Z\nRRULE:FREQ=HOURLY;INTERVAL=1"
    - name: wordpress-mirror
      sourceAppVaultRef: s3-appvault
      destinationAppVaultRef: s3-appvault
      sourceApplicationName: wordpress
      recurrenceRule: "DTSTART:20240101T000000Z\nRRULE:FREQ=HOURLY;INTERVAL=1"
    # To add VM workloads later:
    # - name: vm-workloads-mirror
    #   sourceAppVaultRef: s3-appvault
    #   destinationAppVaultRef: s3-appvault
    #   sourceApplicationName: vm-workloads
    #   recurrenceRule: "DTSTART:20240101T000000Z\nRRULE:FREQ=HOURLY;INTERVAL=1"

  # Backup schedules
  schedules:
    - name: boutique-hourly
      applicationRef: boutique
      appVaultRef: s3-appvault
      granularity: Hourly
      minute: "0"
      snapshotRetention: "24"
      backupRetention: "7"
    - name: wordpress-hourly
      applicationRef: wordpress
      appVaultRef: s3-appvault
      granularity: Hourly
      minute: "0"
      snapshotRetention: "24"
      backupRetention: "7"

  # On-demand snapshots (empty by default - use schedules for automation)
  snapshots: []

  # On-demand backups (empty by default - use schedules for automation)
  backups: []
