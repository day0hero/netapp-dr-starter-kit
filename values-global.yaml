---
global:
  pattern: netapp-dr-starter-kit
  options:
    useCSV: false
    syncPolicy: Automatic
    installPlanApproval: Automatic

tridentProtect:
  appVault:
    enabled: true
    name: s3-appvault
    s3:
      bucketName: trident-protect-bucket
      region: us-west-1

  applications:
    - name: boutique
      namespaces:
        - name: boutique
    - name: wordpress
      namespaces:
        - name: wordpress

  appMirrorRelationships:
    - name: boutique-mirror
      sourceAppVaultRef: s3-appvault
      destinationAppVaultRef: s3-appvault
      sourceApplicationName: boutique
      recurrenceRule: "DTSTART:20240101T000000Z\nRRULE:FREQ=HOURLY;INTERVAL=1"
    - name: wordpress-mirror
      sourceAppVaultRef: s3-appvault
      destinationAppVaultRef: s3-appvault
      sourceApplicationName: wordpress
      recurrenceRule: "DTSTART:20240101T000000Z\nRRULE:FREQ=HOURLY;INTERVAL=1"

  schedules:
    - name: boutique-hourly
      applicationRef: boutique
      appVaultRef: s3-appvault
      granularity: Hourly
      minute: "0"
      snapshotRetention: "24"
      backupRetention: "7"
    - name: wordpress-hourly
      applicationRef: wordpress
      appVaultRef: s3-appvault
      granularity: Hourly
      minute: "0"
      snapshotRetention: "24"
      backupRetention: "7"

main:
  clusterGroupName: hub
  multiSourceConfig:
    enabled: true
    clusterGroupChartVersion: "0.9.*"
