---
global:
  pattern: netapp-dr-starter-kit
  options:
    useCSV: false
    syncPolicy: Automatic
    installPlanApproval: Automatic

tridentProtect:
  appVault:
    enabled: true
    name: s3-appvault
    s3:
      bucketName: trident-protect-bucket
      region: us-west-1

  applications:
    - name: boutique
      namespaces:
        - name: boutique
    - name: wordpress
      namespaces:
        - name: wordpress

# Route53 DR Failover — populated by `make build-dr` when dr_failover_domain is set
drFailover:
  enabled: false
  domain: ""
  apps:
    - name: boutique
      routeName: frontend-dr
      namespace: boutique
      serviceName: frontend
      servicePort: http
    - name: wordpress
      routeName: wordpress-dr
      namespace: wordpress
      serviceName: wordpress
      servicePort: http

crossplane:
  providers:
    version: v2.4.0
  providerConfig:
    name: default
    credentials:
      secretName: aws-provider-creds
      secretNamespace: crossplane-system
      secretKey: credentials
      fromVault: true

main:
  clusterGroupName: hub
  multiSourceConfig:
    enabled: true
    clusterGroupGitRepoUrl: https://github.com/day0hero/clustergroup-chart
    clusterGroupChartGitRevision: resource_actions
    #clusterGroupChartVersion: "0.9.*"
