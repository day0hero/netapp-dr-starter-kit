# AMRs are destination-cluster only (secondary receives replicated data)
tridentProtect:
  appMirrorRelationships:
    - name: boutique-mirror
      sourceAppVaultRef: s3-appvault
      destinationAppVaultRef: s3-appvault
      sourceApplicationName: boutique
      storageClassName: storage-class-nfs
      recurrenceRule: "DTSTART:20240101T000000Z\nRRULE:FREQ=HOURLY;INTERVAL=1"
      namespaceMapping:
        - source: boutique
          destination: boutique
    - name: wordpress-mirror
      sourceAppVaultRef: s3-appvault
      destinationAppVaultRef: s3-appvault
      sourceApplicationName: wordpress
      storageClassName: storage-class-nfs
      recurrenceRule: "DTSTART:20240101T000000Z\nRRULE:FREQ=HOURLY;INTERVAL=1"
      namespaceMapping:
        - source: wordpress
          destination: wordpress
# FSx endpoint IPs are dynamically discovered by fsx-endpoint-watcher CronJob.
# Only SVM names are needed here (deterministic, set by crossplane-setup).
tridentFSX:
  mgmtLIF: ""
  clusterLIF: ""
  svm: SVM2
  interclusterIPs: []
  peer:
    mgmtLIF: ""
    clusterLIF: ""
    svm: SVM1
    interclusterIPs: []
clusterGroup:
  name: secondary
  argoCD:
    resourceHealthChecks:
      - kind: TridentOrchestrator
        group: trident.netapp.io
        check: |
          hs = {}
          if obj.status ~= nil and obj.status.status ~= nil then
            if obj.status.status == "Installed" then
              hs.status = "Healthy"
              hs.message = "Trident installation completed successfully."
            elseif obj.status.status == "Installing" then
              hs.status = "Progressing"
              hs.message = "Trident is currently installing."
            elseif obj.status.status == "Updating" then
              hs.status = "Progressing"
              hs.message = "Trident is currently updating."
            elseif obj.status.status == "Failed" then
              hs.status = "Degraded"
              hs.message = "Trident installation failed. Check operator logs."
            else
              hs.status = "Progressing"
              hs.message = "Trident status unknown or pending."
            end
          else
            hs.status = "Progressing"
            hs.message = "Awaiting TridentOrchestrator status."
          end
          return hs
      # Crossplane FSx: Ready=False during AWS CREATING should be Progressing, not Degraded.
      - kind: OntapFileSystem
        group: fsx.aws.upbound.io
        check: |
          hs = {}
          local ready = nil
          local synced = nil
          local sync_msg = ""
          local ready_msg = ""
          local ready_reason = ""
          if obj.status ~= nil and obj.status.conditions ~= nil then
            for i, c in ipairs(obj.status.conditions) do
              if c.type == "Ready" then
                ready = c.status
                ready_reason = c.reason or ""
                ready_msg = c.message or ""
              elseif c.type == "Synced" then
                synced = c.status
                sync_msg = c.message or ""
              end
            end
          end
          if synced == "False" then
            hs.status = "Degraded"
            hs.message = "Provider sync failed"
            if sync_msg ~= "" then
              hs.message = hs.message .. ": " .. sync_msg
            end
            return hs
          end
          if ready == "True" then
            hs.status = "Healthy"
            hs.message = "FSx ONTAP filesystem is ready."
            return hs
          end
          if ready == "False" then
            local r = string.lower(ready_reason or "")
            if string.find(r, "error") ~= nil or string.find(r, "fail") ~= nil then
              hs.status = "Degraded"
              hs.message = ready_msg ~= "" and ready_msg or ready_reason
              return hs
            end
            hs.status = "Progressing"
            hs.message = "FSx filesystem provisioning: " .. (ready_reason or "in progress")
            if ready_msg ~= "" then
              hs.message = hs.message .. " - " .. ready_msg
            end
            return hs
          end
          hs.status = "Progressing"
          hs.message = "Awaiting FSx OntapFileSystem status."
          return hs
      - kind: OntapStorageVirtualMachine
        group: fsx.aws.upbound.io
        check: |
          hs = {}
          local ready = nil
          local synced = nil
          local sync_msg = ""
          local ready_msg = ""
          local ready_reason = ""
          if obj.status ~= nil and obj.status.conditions ~= nil then
            for i, c in ipairs(obj.status.conditions) do
              if c.type == "Ready" then
                ready = c.status
                ready_reason = c.reason or ""
                ready_msg = c.message or ""
              elseif c.type == "Synced" then
                synced = c.status
                sync_msg = c.message or ""
              end
            end
          end
          if synced == "False" then
            hs.status = "Degraded"
            hs.message = "Provider sync failed"
            if sync_msg ~= "" then
              hs.message = hs.message .. ": " .. sync_msg
            end
            return hs
          end
          if ready == "True" then
            hs.status = "Healthy"
            hs.message = "FSx SVM is ready."
            return hs
          end
          if ready == "False" then
            local r = string.lower(ready_reason or "")
            if string.find(r, "error") ~= nil or string.find(r, "fail") ~= nil then
              hs.status = "Degraded"
              hs.message = ready_msg ~= "" and ready_msg or ready_reason
              return hs
            end
            hs.status = "Progressing"
            hs.message = "FSx SVM provisioning: " .. (ready_reason or "in progress")
            if ready_msg ~= "" then
              hs.message = hs.message .. " - " .. ready_msg
            end
            return hs
          end
          hs.status = "Progressing"
          hs.message = "Awaiting FSx OntapStorageVirtualMachine status."
          return hs
    resourceActions:
      - group: protect.trident.netapp.io
        kind: AppMirrorRelationship
        action: |
          discovery.lua: |
            actions = {}
            actions["Failover"] = {["disabled"] = true}
            actions["Resync"] = {["disabled"] = true}
            if obj.spec ~= nil and obj.spec.desiredState ~= nil then
              if obj.spec.desiredState == "Established" then
                actions["Failover"]["disabled"] = false
              elseif obj.spec.desiredState == "Promoted" then
                actions["Resync"]["disabled"] = false
              end
            end
            return actions
          definitions:
          - name: Failover
            action.lua: |
              obj.spec.desiredState = "Promoted"
              return obj
          - name: Resync
            action.lua: |
              obj.spec.desiredState = "Established"
              return obj
  # Namespace is a dictionary for easier overriding (lists are supported as well)
  namespaces:
    golang-external-secrets:
    crossplane-system:
    trident:
    trident-protect:
    boutique:
    wordpress:
  # The only subscription on spokes is gitops which gets managed by ACM
  subscriptions:
    trident:
      name: trident-operator
      namespace: openshift-operators
      channel: stable
      source: certified-operators
  argoProjects:
    - eso
    - crossplane
    - trident
    - protect
  applications:
    golang-external-secrets:
      name: golang-external-secrets
      namespace: golang-external-secrets
      argoProject: eso
      chart: golang-external-secrets
      chartVersion: 0.2.*
    crossplane:
      name: crossplane
      namespace: crossplane-system
      argoProject: crossplane
      path: charts/all/crossplane
    crossplane-providers:
      name: crossplane-providers
      namespace: crossplane-system
      argoProject: crossplane
      path: charts/all/crossplane-providers
    crossplane-aws-infra:
      name: crossplane-aws-infra
      namespace: crossplane-system
      argoProject: crossplane
      path: charts/all/crossplane-aws-infra
      ignoreDifferences:
        - group: route53.aws.upbound.io
          kind: Record
          jqPathExpressions:
            - .spec.forProvider.healthCheckId
        - group: route53.aws.upbound.io
          kind: HealthCheck
          jqPathExpressions:
            - .spec.forProvider.enableSni
            - .spec.forProvider.tags
        - group: ec2.aws.upbound.io
          kind: VPCPeeringConnectionOptions
          jqPathExpressions:
            - .spec.managementPolicies
    trident:
      name: trident
      namespace: trident
      path: charts/all/trident
      argoProject: trident
      ignoreDifferences:
        - group: trident.netapp.io
          kind: TridentBackendConfig
          jqPathExpressions:
            - .spec.managementLIF
            - .spec.svm
            - .spec.replication
    protect:
      name: trident-protect
      namespace: trident-protect
      argoProject: trident
      chart: trident-protect
      repoURL: https://netapp.github.io/trident-protect-helm-chart
      chartVersion: 100.2510.0
      ignoreDifferences:
        - kind: Secret
          name: tp-webhook-tls
          jqPathExpressions:
            - .data
        - group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
          name: trident-protect-validating-webhook-configurations
          jqPathExpressions:
            - '.webhooks[].clientConfig.caBundle'
    protect-config:
      name: trident-protect-config
      namespace: trident-protect
      argoProject: trident
      path: charts/all/trident-protect-config
      overrides:
        - name: tridentProtect.ontapPeering.role
          value: acceptor
      ignoreDifferences:
        - group: protect.trident.netapp.io
          kind: AppMirrorRelationship
          jqPathExpressions:
            - .spec.sourceApplicationUID
    dr-monitoring:
      name: dr-monitoring
      namespace: openshift-monitoring
      argoProject: trident
      path: charts/all/dr-monitoring
      overrides:
        - name: drMonitoring.clusterRole
          value: secondary
  imperative:
    # NOTE: We *must* use lists and not hashes. As hashes lose ordering once parsed by helm
    # The default schedule is every 10 minutes: imperative.schedule
    # Total timeout of all jobs is 1h: imperative.activeDeadlineSeconds
    # imagePullPolicy is set to always: imperative.imagePullPolicy
    # For additional overrides that apply to the jobs, please refer to
    # https://validatedpatterns.io/patterns/multicloud-gitops/mcg-imperative-actions/
    jobs:
      - name: hello-world
        # ansible playbook to be run
        playbook: rhvp.cluster_utils.hello_world
        # per playbook timeout in seconds
        timeout: 234
        # verbosity: "-v"
  # Explicitly mention the cluster-state based overrides we plan to use for this pattern.
  # We can use self-referential variables because the chart calls the tpl function with these variables defined
  sharedValueFiles:
    - '/overrides/values-{{ $.Values.global.clusterPlatform }}.yaml'
    # To mirror the "Classic" magic include structure, the clusterGroup would need all of these:
    # sharedValueFiles:
    #   - '/overrides/values-{{ $.Values.global.clusterPlatform }}.yaml'
